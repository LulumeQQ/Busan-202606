<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>釜山9日自由行 🐱</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'muji-bg': '#fdfbf7',
                        'muji-text': '#44403c',
                        'ocean-blue': '#0a66c2',
                        'ocean-light': '#e8f4ff',
                        'cat-orange': '#ea580c',
                        'cat-light': '#fff7ed',
                        'card-white': '#ffffff',
                    },
                    fontFamily: {
                        sans: ['"Zen Maru Gothic"', '"Noto Sans TC"', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 4px 15px rgba(0, 0, 0, 0.05)',
                        'floating': '0 10px 25px rgba(10, 102, 194, 0.15)',
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.4s ease-out',
                        'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(5px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #fdfbf7;
            color: #44403c;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .paw-stamp {
            position: absolute;
            bottom: -10px;
            right: -10px;
            font-size: 4rem;
            color: #ea580c;
            opacity: 0;
            transform: scale(0.5) rotate(-20deg);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            z-index: 0;
        }

        .trip-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .trip-card.active {
            border-color: #0a66c2;
            background-color: #e8f4ff;
            transform: scale(1.01);
            box-shadow: 0 4px 12px rgba(10, 102, 194, 0.1);
        }
        .trip-card.active .paw-stamp {
            opacity: 0.1;
            transform: scale(1) rotate(0deg);
            bottom: -5px;
            right: -5px;
        }
        
        .timeline-dot {
            transition: background-color 0.3s, transform 0.3s;
        }
        .timeline-dot.active-dot {
            background-color: #0a66c2 !important;
            border-color: #fff;
            transform: scale(1.3);
            box-shadow: 0 0 0 3px #d4e8ff;
        }

        .muji-input {
            width: 100%;
            background: #f5f5f4;
            border: none;
            border-radius: 12px;
            padding: 12px;
            outline: none;
            transition: box-shadow 0.2s;
        }
        .muji-input:focus {
            box-shadow: 0 0 0 2px #0a66c2;
        }
        
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 100;
        }
        .toast.show { opacity: 1; }

        .long-press-active {
            transform: scale(0.95);
            background-color: #fee2e2;
        }
    </style>
</head>

            play: 'fa-ticket',
            shop: 'fa-bag-shopping'

        function getIcon(name) {
            if (name.includes('護照')) return 'fa-id-card';
            if (name.includes('衣') || name.includes('褲')) return 'fa-shirt';
            if (name.includes('鞋')) return 'fa-shoe-prints';
            if (name.includes('護膚') || name.includes('化妝')) return 'fa-spray-can-sparkles';
            if (name.includes('食')) return 'fa-utensils';
            return 'fa-circle-dot';
        }

        function init() {

        function router(page) {
            document.querySelectorAll('.nav-btn .nav-icon').forEach(el => el.classList.replace('text-ocean-blue', 'text-gray-400'));
            const btn = document.getElementById('btn-' + page);
            if(btn) btn.querySelector('.nav-icon').classList.replace('text-gray-400', 'text-ocean-blue');

            const content = document.getElementById('app-content');
            content.innerHTML = '';
            content.scrollTop = 0;

            switch(page) {
                case 'plan': renderPlan(content); break;
                case 'wallet': renderWallet(content); break;
                case 'lists': renderLists(content); break;
            }
        }

        function renderPlan(container) {
            let flightHTML = `<div class="p-4 space-y-3">
                <div class="bg-white p-4 rounded-2xl shadow-soft">
                    <h3 class="text-xs font-bold text-gray-400 mb-2 uppercase tracking-wider">Flight Info</h3>
                    ${tripData.flights.map(f => `
                        <div class="flex justify-between items-center py-1 border-b border-gray-100 last:border-0">
                            <span class="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded">${f.type}</span>
                            <span class="text-sm font-bold text-muji-text">${f.code}</span>
                            <span class="text-xs text-gray-500">${f.route}</span>
                        </div>
                    `).join('')}
                </div>
            </div>`;

            let switcherHTML = `<div class="flex px-4 gap-2 mb-4 sticky top-0 z-10 py-2 bg-muji-bg/95 backdrop-blur overflow-x-auto no-scrollbar scroll-smooth" id="day-switcher">`;
            tripData.days.forEach(d => {
                switcherHTML += `<button onclick="switchDay('${d.key}')" id="btn-${d.key}" class="min-w-[70px] flex-1 py-2 rounded-xl text-xs font-bold transition-all shadow-sm flex flex-col items-center border-2 bg-white text-muji-text border-gray-200">
                    <span class="text-lg mb-0.5">${d.date.split('/')[1] ? d.date.split('/')[1] : d.date}</span>
                    <span class="opacity-70">${d.week}</span>
                </button>`;
            });
            switcherHTML += `</div>`;

            let timelineHTML = `<div id="timeline-list" class="px-4 pb-8 space-y-4 min-h-screen">${renderDayItems(currentDay)}</div>`;

            container.innerHTML = flightHTML + switcherHTML + timelineHTML;
            checkSelection();
        }

        function switchDay(day) {
            currentDay = day;
            tripData.days.forEach(d => {
                const btn = document.getElementById(`btn-${d.key}`);
                if(btn) {
                    if (day === d.key) {
                        btn.className = `min-w-[70px] flex-1 py-2 rounded-xl text-xs font-bold transition-all shadow-sm flex flex-col items-center border-2 bg-ocean-blue text-white border-ocean-blue`;
                    } else {
                        btn.className = `min-w-[70px] flex-1 py-2 rounded-xl text-xs font-bold transition-all shadow-sm flex flex-col items-center border-2 bg-white text-muji-text border-gray-200`;
                    }
                }
            });

            const timelineContainer = document.getElementById('timeline-list');
            timelineContainer.innerHTML = renderDayItems(day);
            document.getElementById('app-content').scrollTop = 0;
            checkSelection();
        }

        function renderDayItems(day) {
            return tripData.itinerary[day].map((item, index) => {
                const iconClass = icons[item.type] || 'fa-location-dot';
                const highlightClass = item.highlight ? 'text-ocean-blue' : 'text-gray-400';
                const uniqueId = `${day}-${index}`;
                const safeAddr = item.addr ? item.addr.replace(/&/g,'&amp;').replace(/"/g,'&quot;') : '';
                
                let mapBtnHTML = '';
                if (item.addr || item.extraLink) {
                    mapBtnHTML = `<div class="mt-3 flex gap-2">`;
                    if (item.addr) {
                        mapBtnHTML += `<a href="${item.addr}" target="_blank" class="flex-1 inline-flex justify-center items-center text-xs bg-blue-100 text-ocean-blue rounded-lg py-2 font-bold hover:bg-blue-200 transition-colors">
                            <i class="fa-solid fa-link mr-1.5"></i> 開啟連結
                        </a>`;
                    }
                    if (item.extraLink) {
                        mapBtnHTML += `<a href="${item.extraLink}" target="_blank" class="flex-1 inline-flex justify-center items-center text-xs bg-orange-100 text-cat-orange rounded-lg py-2 font-bold hover:bg-orange-200 transition-colors">
                            <i class="fa-solid fa-external-link mr-1.5"></i> 查看更多
                        </a>`;
                    }
                    if (item.addr) {
                        mapBtnHTML += `<button data-addr="${safeAddr}" onclick="copyAddr(this.dataset.addr); event.stopPropagation();" class="inline-flex justify-center items-center w-10 text-xs bg-gray-50 border border-gray-200 rounded-lg hover:bg-gray-100 transition-colors">
                            <i class="fa-solid fa-copy"></i>
                        </button>`;
                    }
                    mapBtnHTML += `</div>`;
                }

                return `
                <div class="flex gap-4 group animate-fade-in" style="animation-delay: ${index * 0.05}s">
                    <div class="flex flex-col items-center min-w-[3rem] pt-2">
                        <span class="text-xs font-bold font-mono text-gray-500 mb-1">${item.time || ''}</span>
                        <div class="w-3.5 h-3.5 rounded-full bg-gray-200 border-2 border-white shadow-sm z-10 timeline-dot" id="dot-${uniqueId}"></div>
                        ${index !== tripData.itinerary[day].length - 1 ? '<div class="w-0.5 flex-1 bg-gray-200 my-1"></div>' : ''}
                    </div>
                    
                    <div class="flex-1 pb-4">
                        <div id="card-${uniqueId}" class="trip-card bg-white p-4 rounded-2xl shadow-soft relative" onclick="toggleSelection('${uniqueId}')">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h4 class="font-bold text-base text-muji-text ${item.highlight ? 'text-ocean-blue' : ''}">${item.title}</h4>
                                    <p class="text-xs text-gray-500 mt-2 leading-relaxed whitespace-pre-wrap">${item.desc}</p>
                                </div>
                                <i class="fa-solid ${iconClass} ${highlightClass} opacity-20 text-2xl absolute top-3 right-3"></i>
                            </div>
                            <div class="paw-stamp">🐾</div>
                            ${mapBtnHTML}
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        function toggleSelection(id) {
            document.querySelectorAll('.trip-card').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.timeline-dot').forEach(el => el.classList.remove('active-dot'));
            const card = document.getElementById(`card-${id}`);
            const dot = document.getElementById(`dot-${id}`);
            if(card) card.classList.add('active');
            if(dot) dot.classList.add('active-dot');
            localStorage.setItem('busan0704_current_selection', id);
        }

        function checkSelection() {
            const savedId = localStorage.getItem('busan0704_current_selection');
            if(savedId && savedId.startsWith(currentDay)) {
                toggleSelection(savedId);
            }
        }

        function copyAddr(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            });
        }

        function renderWallet(container) {
            const totalKrw = expenses.reduce((sum, item) => sum + item.amount, 0);
            const totalTwd = Math.round(totalKrw * walletRate);

            container.innerHTML = `
            <div class="p-4 space-y-6">
                <div class="bg-ocean-blue text-white p-6 rounded-3xl shadow-floating relative overflow-hidden">
                    <div class="absolute -top-8 -right-8 text-8xl opacity-10">🐱</div>
                    <div class="mb-4">
                        <label class="text-xs opacity-80 block mb-1">匯率 (1 KRW = ? TWD)</label>
                        <input type="number" step="0.001" value="${walletRate}" onchange="updateRate(this.value)" class="bg-white/20 text-white w-24 text-center rounded px-2 py-1 outline-none font-bold">
                    </div>
                    <div class="bg-white/10 rounded-xl p-3">
                        <div class="flex gap-2">
                            <input type="text" id="calc-input" placeholder="輸入算式 (如 500+200*3)" onkeypress="handleCalcKey(event)" class="flex-1 bg-transparent text-white placeholder-white/60 outline-none font-mono text-sm">
                            <button onclick="calculate()" class="text-white font-bold w-8"><i class="fa-solid fa-equals"></i></button>
                        </div>
                        <div id="calc-result" class="text-right text-2xl font-bold mt-2 h-8">0</div>
                        <div id="calc-twd" class="text-right text-sm opacity-80 h-5">NT$ 0</div>
                    </div>
                </div>

                <div class="bg-white p-5 rounded-3xl shadow-soft">
                    <h3 class="font-bold text-muji-text mb-4">新增消費</h3>
                    <div class="space-y-3">
                        <input type="text" id="exp-name" placeholder="品項名稱" class="muji-input">
                        <input type="number" id="exp-amount" placeholder="金額 (韓幣)" class="muji-input">
                        <button onclick="addExpense()" class="w-full bg-ocean-blue text-white px-6 py-3 rounded-xl shadow-lg font-bold">儲存</button>
                    </div>
                </div>

                <div class="pb-safe">
                    <div class="flex justify-between items-end mb-2 px-2">
                        <h3 class="font-bold text-muji-text">紀錄</h3>
                        <span class="text-xs text-gray-400">總計 ₩${totalKrw.toLocaleString()} (約 NT$${totalTwd.toLocaleString()})</span>
                    </div>
                    <div class="space-y-3" id="expense-list">
                        ${expenses.slice().reverse().map((item, idx) => `
                            <div class="bg-white p-3 rounded-2xl shadow-sm flex items-center justify-between">
                                <div class="flex-1">
                                    <div class="font-bold text-muji-text">${item.name}</div>
                                    <div class="text-[10px] text-gray-400">${item.date}</div>
                                </div>
                                <div class="text-right mr-3">
                                    <div class="font-mono font-bold text-muji-text">₩${item.amount}</div>
                                    <div class="text-[10px] text-gray-400">NT$${Math.round(item.amount * walletRate)}</div>
                                </div>
                                <button onclick="deleteExpense(${expenses.length - 1 - idx})" class="text-gray-300 hover:text-red-400"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>`;
        }

        function updateRate(val) {
            walletRate = parseFloat(val);
            localStorage.setItem('busan0704_rate', walletRate);
            renderWallet(document.getElementById('app-content'));
        }

        function handleCalcKey(event) {
            if (event.key === 'Enter') {
                calculate();
                event.target.blur();
            }
        }

        function calculate() {
            const input = document.getElementById('calc-input').value.replace(/\s/g, '');
            try {
                if (!input || !/^[0-9+\-*/().]+$/.test(input)) throw new Error('invalid');
                const res = new Function('return (' + input + ')')();
                if (typeof res !== 'number' || !isFinite(res)) throw new Error('invalid');
                document.getElementById('calc-result').innerText = '₩ ' + res.toLocaleString();
                document.getElementById('calc-twd').innerText = '≈ NT$ ' + Math.round(res * walletRate).toLocaleString();
            } catch(e) {
                document.getElementById('calc-result').innerText = 'Error';
                document.getElementById('calc-twd').innerText = '';
            }
        }

        function addExpense() {
            const name = document.getElementById('exp-name').value;
            const amount = parseFloat(document.getElementById('exp-amount').value);
            if(!name || !amount) { alert('請輸入名稱與金額'); return; }
            const newExp = {
                name, amount,
                date: new Date().toLocaleString('zh-TW', {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'})
            };
            expenses.push(newExp);
            localStorage.setItem('busan0704_expenses', JSON.stringify(expenses));
            document.getElementById('exp-name').value = '';
            document.getElementById('exp-amount').value = '';
            renderWallet(document.getElementById('app-content'));
        }

        function deleteExpense(idx) {
            if(confirm('確定刪除？')) {
                expenses.splice(idx, 1);
                localStorage.setItem('busan0704_expenses', JSON.stringify(expenses));
                renderWallet(document.getElementById('app-content'));
            }
        }

        function renderLists(container) {
            let displayLuggageItems = [...tripData.checklist.luggage.items];
            if (customChecklistItems.length > 0) {
                displayLuggageItems = [...customChecklistItems, ...displayLuggageItems];
            }
            const renderData = {
                luggage: { ...tripData.checklist.luggage, items: displayLuggageItems },
                shopping: tripData.checklist.shopping
            };
            container.innerHTML = `
            <div class="p-4 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    ${Object.keys(renderData).map(key => {
                        const list = renderData[key];
                        return `
                        <div class="bg-white rounded-3xl p-5 shadow-soft cursor-pointer hover:shadow-lg transition-all active:scale-95 flex flex-col items-center justify-center gap-3 h-32" onclick="toggleList('${key}')">
                            <i class="fa-solid ${list.icon} text-4xl ${list.color}"></i>
                            <h3 class="font-bold text-muji-text text-sm">${list.title}</h3>
                        </div>
                        `;
                    }).join('')}
                </div>

                ${Object.keys(renderData).map(key => {
                    const list = renderData[key];
                    return `
                    <div id="list-content-${key}" class="hidden bg-white rounded-3xl p-5 shadow-soft animate-fade-in">
                        <div class="flex justify-between items-center mb-4 border-l-4 border-ocean-blue pl-3">
                            <h3 class="font-bold text-muji-text">${list.title}</h3>
                            <button onclick="toggleList('${key}')" class="text-gray-400"><i class="fa-solid fa-xmark"></i></button>
                        </div>
                        <div class="grid grid-cols-2 gap-x-3 gap-y-3">
                            ${list.items.filter(item => !deletedListItems[item]).map((item, idx) => {
                                return `
                                <label class="flex items-center space-x-2 p-2 rounded-lg bg-gray-50 hover:bg-blue-50 cursor-pointer group transition-colors select-none" data-item="${item}" data-list="${key}" onmousedown="startLongPress(this)" onmouseup="cancelLongPress()" onmouseleave="cancelLongPress()" ontouchstart="startLongPress(this)" ontouchend="cancelLongPress()">
                                    <div class="relative flex items-center flex-shrink-0">
                                        <input type="checkbox" onchange="toggleCheck(this.closest('label').dataset.item)" ${checklistState[item] ? 'checked' : ''} class="peer h-4 w-4 cursor-pointer appearance-none border-2 border-gray-300 rounded checked:bg-ocean-blue checked:border-ocean-blue">
                                        <i class="fa-solid fa-check text-white absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-[10px] opacity-0 peer-checked:opacity-100 pointer-events-none"></i>
                                    </div>
                                    <span class="text-xs text-gray-600 peer-checked:text-gray-300 peer-checked:line-through truncate font-medium">${item}</span>
                                </label>
                                `;
                            }).join('')}
                        </div>
                        <p class="text-[10px] text-gray-300 mt-4 text-center">💡 長按項目可刪除</p>
                    </div>
                    `;
                }).join('')}

                <div class="bg-white rounded-3xl p-5 shadow-soft">
                    <h3 class="font-bold text-muji-text mb-2 border-l-4 border-ocean-blue pl-3">個人備忘錄</h3>
                    <textarea id="memo-input" class="w-full bg-muji-bg rounded-xl p-3 text-sm leading-relaxed outline-none resize-none border border-transparent focus:border-ocean-blue h-24" placeholder="輸入備忘錄內容，以換行或逗號分隔多個項目..."></textarea>
                    <button onclick="saveMemoAsItem()" class="w-full mt-3 bg-ocean-blue text-white py-2 rounded-lg text-sm font-bold shadow-md active:scale-95 transition-transform">儲存並加入清單</button>
                </div>
            </div>`;
        }

        function toggleList(key) {
            document.querySelectorAll('[id^="list-content-"]').forEach(el => el.classList.add('hidden'));
            const target = document.getElementById(`list-content-${key}`);
            if(target) {
                target.classList.remove('hidden');
                target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        function toggleCheck(item) {
            checklistState[item] = !checklistState[item];
            localStorage.setItem('busan0704_checklist', JSON.stringify(checklistState));
        }

        let longPressTimer;
        function startLongPress(el) {
            el.classList.add('long-press-active');
            const item = el.dataset.item;
            const listKey = el.dataset.list;
            longPressTimer = setTimeout(() => {
                if(confirm(`確定刪除「${item}」嗎？`)) {
                    deleteListItem(item, listKey);
                }
            }, 500);
        }

        function cancelLongPress() {
            clearTimeout(longPressTimer);
            document.querySelectorAll('[data-item]').forEach(el => el.classList.remove('long-press-active'));
        }

        function deleteListItem(item, listKey) {
            deletedListItems[item] = true;
            localStorage.setItem('busan0704_deleted_items', JSON.stringify(deletedListItems));
            renderLists(document.getElementById('app-content'));
        }

        function saveMemoAsItem() {
            const memo = document.getElementById('memo-input').value;
            if (!memo) return;
            const items = memo.split(/[\n、，,]/).map(s => s.trim()).filter(s => s);
            customChecklistItems = [...customChecklistItems, ...items];
            localStorage.setItem('busan0704_custom_items', JSON.stringify(customChecklistItems));
            document.getElementById('memo-input').value = '';
            renderLists(document.getElementById('app-content'));
        }

        init();
    </script>
</body>
</html>
