    <style>
        body {
            background-color: #fdfbf7;
            color: #44403c;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .paw-stamp {
            position: absolute;
            bottom: -10px;
            right: -10px;
            font-size: 4rem;
            color: #ea580c;
            opacity: 0;
            transform: scale(0.5) rotate(-20deg);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            z-index: 0;
        }

        .trip-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .trip-card.active {
            border-color: #0a66c2;
            background-color: #e8f4ff;
            transform: scale(1.01);
            box-shadow: 0 4px 12px rgba(10, 102, 194, 0.1);
        }
        .trip-card.active .paw-stamp {
            opacity: 0.1;
            transform: scale(1) rotate(0deg);
            bottom: -5px;
            right: -5px;
        }
        
        .timeline-dot {
            transition: background-color 0.3s, transform 0.3s;
        }
        .timeline-dot.active-dot {
            background-color: #0a66c2 !important;
            border-color: #fff;
            transform: scale(1.3);
            box-shadow: 0 0 0 3px #d4e8ff;
        }

        .muji-input {
            width: 100%;
            background: #f5f5f4;
            border: none;
            border-radius: 12px;
            padding: 12px;
            outline: none;
            transition: box-shadow 0.2s;
        }
        .muji-input:focus {
            box-shadow: 0 0 0 2px #0a66c2;
        }
        
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 100;
        }
        .toast.show { opacity: 1; }

        .long-press-active {
            transform: scale(0.95);
            background-color: #fee2e2;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        th, td {
            border: 1px solid #e5e7eb;
            padding: 8px 4px;
            text-align: center;
        }

        th {
            background-color: #0a66c2;
            color: white;
            font-weight: bold;
        }

        tr:nth-child(even) {
            background-color: #f9fafb;
        }

        .route-cell {
            text-align: left;
            padding: 8px;
        }

        .subtotal-row {
            background-color: #e8f4ff;
            font-weight: bold;
        }

        .total-row {
            background-color: #0a66c2;
            color: white;
            font-weight: bold;
        }
    </style>
</head>

            document.querySelectorAll('.nav-btn .nav-icon').forEach(el => el.classList.replace('text-ocean-blue', 'text-gray-400'));

            if(btn) btn.querySelector('.nav-icon').classList.replace('text-gray-400', 'text-ocean-blue');

            const content = document.getElementById('app-content');
            content.innerHTML = '';
            content.scrollTop = 0;

            switch(page) {
                case 'plan': renderPlan(content); break;
                case 'guide': renderGuide(content); break;
                case 'taxi': renderTaxi(content); break;
                case 'wallet': renderWallet(content); break;
                case 'lists': renderLists(content); break;
            }
        }
