<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>釜山9日自由行</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Zen+Maru+Gothic:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            font-family: 'Zen Maru Gothic', 'Noto Sans TC', sans-serif;
        }
        
        .ocean-blue { color: #0284c7; }
        .ocean-bg { background-color: #0284c7; }
        .ocean-light { background-color: #e0f2fe; }
        
        .card-shadow {
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .tab-btn {
            transition: all 0.3s ease;
        }
        
        .tab-btn.active {
            color: #0284c7;
            border-bottom: 3px solid #0284c7;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .itinerary-item {
            border-left: 4px solid #0284c7;
            padding-left: 16px;
        }
        
        .checklist-item {
            transition: all 0.2s ease;
        }
        
        .checklist-item.checked {
            opacity: 0.5;
            text-decoration: line-through;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="ocean-bg text-white sticky top-0 z-50 shadow-lg">
        <div class="max-w-lg mx-auto px-4 py-6">
            <div class="flex items-center gap-3 mb-2">
                <i class="fas fa-umbrella-beach text-2xl"></i>
                <h1 class="text-3xl font-bold">釜山9日自由行</h1>
            </div>
            <p class="text-sm opacity-90">2026/06/26 – 07/04｜9 天 8 夜釜山自由行 Web App</p>
        </div>
    </header>
    
    <!-- Navigation Tabs -->
    <nav class="ocean-light sticky top-20 z-40">
        <div class="max-w-lg mx-auto flex justify-around border-b border-blue-300">
            <button class="tab-btn active px-4 py-3 font-semibold flex items-center gap-2" onclick="switchTab('plan')">
                <i class="fas fa-map"></i> 行程
            </button>
            <button class="tab-btn px-4 py-3 font-semibold flex items-center gap-2" onclick="switchTab('wallet')">
                <i class="fas fa-wallet"></i> 記帳
            </button>
            <button class="tab-btn px-4 py-3 font-semibold flex items-center gap-2" onclick="switchTab('lists')">
                <i class="fas fa-list-check"></i> 清單
            </button>
        </div>
    </nav>
    
    <!-- Main Content -->
    <main class="max-w-lg mx-auto px-4 py-6 pb-20">
        
        <!-- Plan Tab -->
        <div id="plan" class="tab-content active">
            <!-- Flights Info -->
            <div class="bg-white rounded-lg card-shadow p-4 mb-6">
                <h2 class="text-xl font-bold ocean-blue mb-4 flex items-center gap-2">
                    <i class="fas fa-plane"></i> 航班資訊
                </h2>
                <div class="space-y-3">
                    <div class="bg-blue-50 p-3 rounded">
                        <p class="font-semibold"><i class="fas fa-plane-departure text-blue-600"></i> 去程</p>
                        <p class="text-sm mt-1">2026/06/26 (Fri) | KA 182 | 台北 08:10 ➝ 釜山 11:50</p>
                    </div>
                    <div class="bg-blue-50 p-3 rounded">
                        <p class="font-semibold"><i class="fas fa-plane-arrival text-blue-600"></i> 回程</p>
                        <p class="text-sm mt-1">2026/07/04 (Sat) | KA 183 | 釜山 13:30 ➝ 台北 16:50</p>
                    </div>
                </div>
            </div>
            
            <!-- Itinerary -->
            <div class="bg-white rounded-lg card-shadow p-4 mb-6">
                <h2 class="text-xl font-bold ocean-blue mb-4 flex items-center gap-2">
                    <i class="fas fa-calendar-days"></i> 每日行程
                </h2>
                <div id="itinerary-container" class="space-y-4">
                    <!-- Items will be generated by JavaScript -->
                </div>
            </div>
        </div>
        
        <!-- Wallet Tab -->
        <div id="wallet" class="tab-content">
            <div class="bg-white rounded-lg card-shadow p-4 mb-6">
                <h2 class="text-xl font-bold ocean-blue mb-4 flex items-center gap-2">
                    <i class="fas fa-wallet"></i> 旅費記帳
                </h2>
                
                <!-- Exchange Rate -->
                <div class="mb-6 p-4 bg-blue-50 rounded-lg">
                    <label class="block text-sm font-semibold mb-2">💱 匯率 (KRW → TWD)</label>
                    <input type="number" id="exchange-rate" class="w-full px-3 py-2 border border-blue-300 rounded" placeholder="輸入匯率" step="0.01">
                    <p class="text-xs text-gray-600 mt-2">目前匯率會自動儲存到本地</p>
                </div>
                
                <!-- Add Expense -->
                <div class="mb-6 p-4 bg-gray-50 rounded-lg">
                    <h3 class="font-semibold mb-3">新增消費</h3>
                    <input type="text" id="exp-title" class="w-full px-3 py-2 border rounded mb-2" placeholder="消費項目">
                    <input type="number" id="exp-amount" class="w-full px-3 py-2 border rounded mb-2" placeholder="金額 (KRW)">
                    <input type="date" id="exp-date" class="w-full px-3 py-2 border rounded mb-2">
                    <button onclick="addExpense()" class="w-full bg-blue-500 text-white py-2 rounded font-semibold hover:bg-blue-600">
                        <i class="fas fa-plus"></i> 新增
                    </button>
                </div>
                
                <!-- Expenses List -->
                <div>
                    <h3 class="font-semibold mb-3">消費紀錄</h3>
                    <div id="expenses-list" class="space-y-2">
                        <!-- Items will be generated by JavaScript -->
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Lists Tab -->
        <div id="lists" class="tab-content">
            <div class="bg-white rounded-lg card-shadow p-4 mb-6">
                <h2 class="text-xl font-bold ocean-blue mb-4 flex items-center gap-2">
                    <i class="fas fa-list-check"></i> 行李與購物清單
                </h2>
                <div id="checklists-container" class="space-y-6">
                    <!-- Items will be generated by JavaScript -->
                </div>
            </div>
        </div>
    </main>
    
    <!-- JavaScript -->
    <script>
        const PREFIX = 'busan0704';
        
        const tripData = {
            flights: [
                { date: '2026-06-26', code: 'KA 182', route: '台北 08:10 ➝ 釜山 11:50' },
                { date: '2026-07-04', code: 'KA 183', route: '釜山 13:30 ➝ 台北 16:50' }
            ],
            days: [
                { key: 'D1', date: '06/26', week: 'Fri' },
                { key: 'D2', date: '06/27', week: 'Sat' },
                { key: 'D3', date: '06/28', week: 'Sun' },
                { key: 'D4', date: '06/29', week: 'Mon' },
                { key: 'D5', date: '06/30', week: 'Tue' },
                { key: 'D6', date: '07/01', week: 'Wed' },
                { key: 'D7', date: '07/02', week: 'Thu' },
                { key: 'D8', date: '07/03', week: 'Fri' },
                { key: 'D9', date: '07/04', week: 'Sat' }
            ],
            itinerary: {
                'D1': [
                    { time: '08:10', title: '起飛', desc: 'KA 182 台北 ➝ 釜山', type: 'flight', link: '', highlight: true },
                    { time: '11:50', title: '抵達釜山', desc: '入住廣安里 Airbnb', type: 'arrival', link: '', highlight: true }
                ],
                'D2': [
                    { time: '09:00', title: '廣安里海灘散步', desc: '享受釜山海灘風景', type: 'play', link: '', highlight: false },
                    { time: '12:00', title: '午餐', desc: '海邊餐廳', type: 'food', link: '', highlight: false }
                ],
                'D3': [
                    { time: '09:00', title: '景點遊覽', desc: '自由探索', type: 'play', link: '', highlight: false }
                ],
                'D4': [
                    { time: '09:00', title: '景點遊覽', desc: '自由探索', type: 'play', link: '', highlight: false }
                ],
                'D5': [
                    { time: '09:00', title: '景點遊覽', desc: '自由探索', type: 'play', link: '', highlight: false }
                ],
                'D6': [
                    { time: '09:00', title: '景點遊覽', desc: '自由探索', type: 'play', link: '', highlight: false }
                ],
                'D7': [
                    { time: '09:00', title: '景點遊覽', desc: '自由探索', type: 'play', link: '', highlight: false }
                ],
                'D8': [
                    { time: '09:00', title: '最後購物與遊覽', desc: '準備返程', type: 'shop', link: '', highlight: false }
                ],
                'D9': [
                    { time: '13:30', title: '返回台灣', desc: 'KA 183 釜山 ➝ 台北', type: 'flight', link: '', highlight: true }
                ]
            },
            checklist: {
                luggage: {
                    title: '行李清單',
                    icon: 'fa-suitcase',
                    color: 'text-blue-500',
                    items: [
                        '護照',
                        '機票',
                        '信用卡/現金',
                        '手機充電器',
                        '衣物（7-8套）',
                        '內衣褲/襪子',
                        '盥洗用品',
                        '防曬乳',
                        '晴雨傘',
                        '舒適的鞋子'
                    ]
                },
                shopping: {
                    title: '購物清單',
                    icon: 'fa-bag-shopping',
                    color: 'text-pink-500',
                    items: [
                        '韓妝保養品',
                        '零食',
                        '紀念品',
                        '服飾'
                    ]
                }
            }
        };
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadExchangeRate();
            renderItinerary();
            renderWallet();
            renderLists();
        });
        
        // Tab switching
        function switchTab(tab) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            // Show selected tab
            document.getElementById(tab).classList.add('active');
            event.target.closest('.tab-btn').classList.add('active');
        }
        
        // Itinerary
        function renderItinerary() {
            const container = document.getElementById('itinerary-container');
            container.innerHTML = tripData.days.map(day => {
                const items = tripData.itinerary[day.key] || [];
                return `
                    <div class="border rounded-lg overflow-hidden">
                        <div class="bg-blue-100 p-3 font-semibold ocean-blue">
                            ${day.key} • ${day.date} (${day.week})
                        </div>
                        <div class="p-3 space-y-2">
                            ${items.map(item => `
                                <div class="itinerary-item p-2 ${item.highlight ? 'bg-yellow-50' : 'bg-white'}">
                                    <div class="flex justify-between items-start">
                                        <div>
                                            <p class="font-semibold text-sm">${item.time} • ${item.title}</p>
                                            <p class="text-xs text-gray-600 mt-1">${item.desc}</p>
                                        </div>
                                        <i class="fas ${getTypeIcon(item.type)} ocean-blue"></i>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function getTypeIcon(type) {
            const icons = {
                transport: 'fa-car-side',
                flight: 'fa-plane-departure',
                arrival: 'fa-plane-arrival',
                car: 'fa-key',
                food: 'fa-utensils',
                hotel: 'fa-bed',
                play: 'fa-ticket',
                shop: 'fa-bag-shopping'
            };
            return icons[type] || 'fa-circle';
        }
        
        // Wallet
        function loadExchangeRate() {
            const rate = localStorage.getItem(`${PREFIX}_rate`) || '0.024';
            document.getElementById('exchange-rate').value = rate;
            document.getElementById('exchange-rate').addEventListener('change', (e) => {
                localStorage.setItem(`${PREFIX}_rate`, e.target.value);
            });
        }
        
        function addExpense() {
            const title = document.getElementById('exp-title').value;
            const amount = document.getElementById('exp-amount').value;
            const date = document.getElementById('exp-date').value;
            
            if (!title || !amount || !date) {
                alert('請填寫所有欄位');
                return;
            }
            
            const expenses = JSON.parse(localStorage.getItem(`${PREFIX}_expenses`) || '[]');
            expenses.push({ title, amount: parseFloat(amount), date });
            localStorage.setItem(`${PREFIX}_expenses`, JSON.stringify(expenses));
            
            document.getElementById('exp-title').value = '';
            document.getElementById('exp-amount').value = '';
            document.getElementById('exp-date').value = '';
            
            renderWallet();
        }
        
        function renderWallet() {
            const expenses = JSON.parse(localStorage.getItem(`${PREFIX}_expenses`) || '[]');
            const rate = parseFloat(document.getElementById('exchange-rate').value) || 0.024;
            const container = document.getElementById('expenses-list');
            
            if (expenses.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-sm">尚無消費記錄</p>';
                return;
            }
            
            let total = 0;
            container.innerHTML = expenses.map((exp, idx) => {
                total += exp.amount;
                const twd = (exp.amount * rate).toFixed(0);
                return `
                    <div class="flex justify-between items-center p-3 bg-gray-50 rounded">
                        <div>
                            <p class="font-semibold text-sm">${exp.title}</p>
                            <p class="text-xs text-gray-600">${exp.date}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-semibold text-sm">₩${exp.amount.toLocaleString()}</p>
                            <p class="text-xs text-gray-600">NT$${twd}</p>
                        </div>
                    </div>
                `;
            }).join('');
            
            const totalTwd = (total * rate).toFixed(0);
            container.innerHTML += `
                <div class="mt-4 p-3 bg-blue-50 rounded border-t-2 border-blue-500">
                    <div class="flex justify-between">
                        <p class="font-semibold">合計</p>
                        <div class="text-right">
                            <p class="font-bold">₩${total.toLocaleString()}</p>
                            <p class="text-sm text-blue-600">NT$${totalTwd}</p>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // Lists
        function renderLists() {
            const container = document.getElementById('checklists-container');
            container.innerHTML = Object.entries(tripData.checklist).map(([key, list]) => {
                const savedState = JSON.parse(localStorage.getItem(`${PREFIX}_checklist_${key}`) || '{}');
                return `
                    <div class="border rounded-lg overflow-hidden">
                        <div class="bg-blue-100 p-3 font-semibold ocean-blue flex items-center gap-2">
                            <i class="fas ${list.icon}"></i> ${list.title}
                        </div>
                        <div class="p-3 space-y-2">
                            ${list.items.map((item, idx) => {
                                const isChecked = savedState[idx] || false;
                                return `
                                    <label class="flex items-center gap-2 checklist-item cursor-pointer ${isChecked ? 'checked' : ''}">
                                        <input type="checkbox" ${isChecked ? 'checked' : ''} 
                                            onchange="updateChecklistItem('${key}', ${idx}, this.checked)"
                                            class="w-4 h-4">
                                        <span class="text-sm">${item}</span>
                                    </label>
                                `;
                            }).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function updateChecklistItem(key, idx, checked) {
            const state = JSON.parse(localStorage.getItem(`${PREFIX}_checklist_${key}`) || '{}');
            state[idx] = checked;
            localStorage.setItem(`${PREFIX}_checklist_${key}`, JSON.stringify(state));
            renderLists();
        }
    </script>
</body>
</html>
